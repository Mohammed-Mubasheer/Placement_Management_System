spring.application.name=PlacementManagementProject
# Server Port (Default is 8080, but you can change it if needed)
server.port=8080

# Database Connection Settings
# REPLACE 'placement_db' with the actual name of your local database
spring.datasource.url=jdbc:postgresql://localhost:5432/placement_db
# REPLACE with your actual PostgreSQL username (usually 'postgres')
spring.datasource.username=postgres
# REPLACE with your actual PostgreSQL password
spring.datasource.password=source

# PostgreSQL Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
# 'update' will create/update tables based on your Entity classes automatically
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console (Great for debugging TDD test cases)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect